# CI/测试环境 Docker Compose 配置
services:
  # MongoDB数据库（测试专用）
  mongodb-test:
    image: mongo:7.0
    container_name: qingyu-mongodb-test
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: qingyu_test
    command: mongod --bind_ip_all
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    tmpfs:
      - /data/db  # 使用内存存储，测试结束自动清理

  # MongoDB副本集初始化器
  mongodb-init:
    image: mongo:7.0
    container_name: qingyu-mongodb-init
    depends_on:
      mongodb-test:
        condition: service_healthy
    networks:
      - test-network
    entrypoint: >
      bash -c "
        sleep 3 &&
        mongosh --host mongodb-test:27017 -u admin -p password --authenticationDatabase admin --eval '
          try {
            rs.status();
          } catch(e) {
            rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb-test:27017\"}]});
            print(\"Replica set initialized\");
          }
        ' &&
        echo 'MongoDB replica set ready'
      "

  # Redis缓存（测试专用）
  redis-test:
    image: redis:7-alpine
    container_name: qingyu-redis-test
    ports:
      - "6379:6379"
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
    tmpfs:
      - /data  # 使用内存存储

  # gRPC AI服务（测试专用）
  grpc-ai-service:
    image: python:3.11-slim
    container_name: qingyu-grpc-ai-test
    command: >
      python -u -c "import socket;
      s=socket.socket();
      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1);
      s.bind(('0.0.0.0', 50051));
      s.listen(16);
      print('grpc-ai mock listening on 50051', flush=True);
      import time;
      while True:
        c,_=s.accept();
        c.close()"
    ports:
      - "50051:50051"
    networks:
      - test-network
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-test-api-key}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-test-api-key}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 50051))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    tmpfs:
      - /tmp

networks:
  test-network:
    driver: bridge

