version: "2"
run:
  go: "1.25"
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*github.com/gorilla/websocket.Conn).Close
        - (*github.com/gorilla/websocket.Conn).SetReadDeadline
        - (*github.com/gorilla/websocket.Conn).SetWriteDeadline
        - (*github.com/gorilla/websocket.Conn).WriteMessage
        - (net.Conn).Close
        - (*go.mongodb.org/mongo-driver/mongo.Cursor).Close
        - (*go.mongodb.org/mongo-driver/mongo.Client).Disconnect
        - (*go.mongodb.org/mongo-driver/mongo.Database).Close
        - (net/http.Response.Body).Close
        - (*compress/gzip.Writer).Close
        - (*compress/gzip.Reader).Close
        - (*os.File).Close
        - (*github.com/redis/go-redis/v9.Client).Delete
        - (*github.com/redis/go-redis/v9.Client).Unlock
        - crypto/rand.Read
    govet:
      enable:
        - asmdecl
        - assign
        - atomic
        - atomicalign
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - errorsas
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - nilness
        - printf
        - reflectvaluecompare
        - shift
        - sigchanyzer
        - sortslice
        - stdmethods
        - stringintconv
        - structtag
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult
      enable-all: false
    staticcheck:
      checks:
        - all
        - -QF*
        - -ST*
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
        path: (\.archive/|_deprecated/)
      - linters:
          - staticcheck
        text: SA1029
      - linters:
          - staticcheck
        text: SA6005
      - linters:
          - staticcheck
        text: SA9003
      - linters:
          - staticcheck
        text: S1009
      - linters:
          - staticcheck
        text: S1016
      - linters:
          - errcheck
          - ineffassign
        path: _test\.go
      - path: (.+)\.go$
        text: Error return value of .*\.Close.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Disconnect.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Delete.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Unlock.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.SetReadDeadline.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.SetWriteDeadline.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.WriteMessage.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Read.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.InsertOne.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.WriteString.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Walk.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.All.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.(Unmarshal|Marshal).* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Ack.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Subscribe.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Send.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.AbortTransaction.* is not checked
      - path: (.+)\.go$
        text: Error return value of `.*go.*` .* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.WithRequestID.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.WithContext.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.UpdatePoolMetrics.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Set.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Invalidate.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.(RevokeToken|GenerateToken|ValidateToken).* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.PublishAsync.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Repo\.(Update|Create).* is not checked
      - path: (.+)\.go$
        text: Error return value of .*repo\.(Update|Create).* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Seek.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Copy.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Write.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Sscanf.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Scanf.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Scanln.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.RemoveAll.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Decode.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Fprintf.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*\.Fprint.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*cleanup.* is not checked
      - path: (.+)\.go$
        text: Error return value of .*ensureIndexes.* is not checked
      - path: (.+)\.go$
        text: Error return value of `c\.Error.*` is not checked
      - path: (.+)\.go$
        text: Error return value of `\(\*encoding/json\.Encoder\)\.Encode` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*batchOpSvc\.Execute` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*SaveReadingProgress` is not checked
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
