name: Swagger Artifact Sync

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - 'api/v1/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.25'

jobs:
  verify-swagger-artifacts:
    name: Verify Swagger Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install swag
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify committed swagger artifacts
        run: |
          make swagger-verify-committed
