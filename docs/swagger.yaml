paths:
  /admin/permission-templates:
    get:
      consumes:
      - application/json
      description: 获取权限模板列表，可按分类筛选
      parameters:
      - description: 分类(reader/author/admin)
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 列出权限模板
      tags:
      - 权限模板
    post:
      consumes:
      - application/json
      description: 创建新的权限模板
      parameters:
      - description: 创建请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 创建权限模板
      tags:
      - 权限模板
  /admin/permission-templates/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定的权限模板
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 删除权限模板
      tags:
      - 权限模板
    get:
      consumes:
      - application/json
      description: 根据ID获取权限模板详情
      parameters:
      - description: 模板ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
