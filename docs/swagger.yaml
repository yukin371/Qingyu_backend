basePath: /api/v1
definitions:
  Qingyu_backend_api_v1_ai.GenerateOutlineRequest:
    properties:
      correction_prompt:
        description: 修正提示
        type: string
      project_id:
        description: 项目ID（可选）
        type: string
      task:
        description: 创作任务描述
        type: string
      workspace_context:
        additionalProperties:
          type: string
        description: 工作区上下文
        type: object
    required:
    - task
    type: object
  Qingyu_backend_api_v1_finance.WithdrawRequest:
    properties:
      account_name:
        type: string
      account_no:
        type: string
      account_type:
        type: string
      amount:
        type: number
      bank_name:
        type: string
      branch_name:
        type: string
      method:
        enum:
        - alipay
        - wechat
        - bank
        type: string
    required:
    - account_name
    - account_no
    - account_type
    - amount
    - method
    type: object
  Qingyu_backend_api_v1_reader.BatchUpdateBookStatusRequest:
    properties:
      bookIds:
        description: 书籍ID列表
        items:
          type: string
        type: array
      status:
        description: reading(在读), want_read(想读), finished(读完)
        type: string
    required:
    - bookIds
    - status
    type: object
  Qingyu_backend_api_v1_reader.UpdateBookStatusRequest:
    properties:
      status:
        description: reading(在读), want_read(想读), finished(读完)
        type: string
    required:
    - status
    type: object
  Qingyu_backend_api_v1_reader.UpdateReadingTimeRequest:
    properties:
      bookId:
        type: string
      duration:
        minimum: 1
        type: integer
    required:
    - bookId
    - duration
    type: object
  Qingyu_backend_api_v1_search.SearchRequest:
    properties:
      filter:
        additionalProperties: true
        description: 过滤条件
        type: object
      page:
        description: 页码，默认 1
        type: integer
      page_size:
        description: 每页数量，默认 20
        type: integer
      query:
        description: 搜索关键词
        type: string
      sort:
        description: 排序字段
        items:
          $ref: '#/definitions/search.SortFieldRequest'
        type: array
      type:
        description: 搜索类型：books, projects, documents, users
        type: string
    required:
    - query
    - type
    type: object
  admin.ApplyTemplateRequest:
    properties:
      roleId:
        type: string
    required:
    - roleId
    type: object
  admin.AssignRoleRequest:
    properties:
      role:
        type: string
    required:
    - role
    type: object
  admin.BatchCreateUserRequest:
    properties:
      count:
        maximum: 100
        minimum: 1
        type: integer
      prefix:
        type: string
      role:
        enum:
        - reader
        - author
        - admin
        type: string
      status:
        type: string
    required:
    - count
    - role
    type: object
  admin.BatchDeleteRequest:
    properties:
      ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - ids
    type: object
  admin.BatchDeleteUsersRequest:
    properties:
      userIds:
        items:
          type: string
        type: array
    required:
    - userIds
    type: object
  admin.BatchReviewAuditRequest:
    properties:
      action:
        enum:
        - approve
        - reject
        type: string
      auditIds:
        items:
          type: string
        minItems: 1
        type: array
      reviewNote:
        type: string
    required:
    - action
    - auditIds
    type: object
  admin.BatchRoleOperationRequest:
    properties:
      role:
        enum:
        - reader
        - author
        - admin
        type: string
      userIds:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - role
    - userIds
    type: object
  admin.BatchUpdateConfigRequest:
    properties:
      updates:
        items:
          $ref: '#/definitions/admin.UpdateConfigRequest'
        minItems: 1
        type: array
    required:
    - updates
    type: object
  admin.BatchUpdateStatusRequest:
    properties:
      status:
        type: string
      userIds:
        items:
          type: string
        type: array
    required:
    - status
    - userIds
    type: object
  admin.CreateCategoryRequest:
    properties:
      description:
        example: 玄幻小说分类
        type: string
      icon:
        example: /icons/xuanhuan.png
        type: string
      name:
        example: 玄幻
        type: string
      parent_id:
        example: ""
        type: string
      sort_order:
        example: 1
        type: integer
    required:
    - name
    type: object
  admin.CreateTemplateRequest:
    properties:
      category:
        type: string
      code:
        type: string
      description:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - code
    - name
    - permissions
    type: object
  admin.CreateUserRequest:
    properties:
      bio:
        type: string
      email:
        type: string
      nickname:
        type: string
      password:
        type: string
      role:
        enum:
        - reader
        - author
        - admin
        type: string
      status:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - role
    - username
    type: object
  admin.CustomAnalyticsQuery:
    properties:
      dimensions:
        description: 维度：date, category, etc.
        items:
          type: string
        type: array
      end_date:
        type: string
      filters:
        additionalProperties: true
        description: 过滤条件
        type: object
      limit:
        type: integer
      metrics:
        description: 指标：users, books, revenue, etc.
        items:
          type: string
        type: array
      start_date:
        type: string
    required:
    - end_date
    - metrics
    - start_date
    type: object
  admin.MoveCategoryRequest:
    properties:
      new_parent_id:
        example: parent_category_id
        type: string
    required:
    - new_parent_id
    type: object
  admin.PermissionRequest:
    properties:
      action:
        example: read
        type: string
      code:
        example: user.read
        type: string
      description:
        example: 读取用户信息的权限
        type: string
      effect:
        example: allow
        type: string
      name:
        example: 读取用户
        type: string
      priority:
        example: 1
        type: integer
      resource:
        example: user
        type: string
    required:
    - code
    - name
    type: object
  admin.ReplayEventsRequest:
    properties:
      dry_run:
        description: 是否为dry-run模式（可选，默认false）
        type: boolean
      event_type:
        description: 事件类型（可选）
        type: string
      from:
        description: 开始时间（ISO8601格式，可选）
        type: string
      limit:
        description: 限制数量（可选，默认1000，最大10000）
        type: integer
      to:
        description: 结束时间（ISO8601格式，可选）
        type: string
    type: object
  admin.ReviewAppealRequest:
    properties:
      action:
        enum:
        - approve
        - reject
        type: string
      review_note:
        maxLength: 500
        type: string
    required:
    - action
    type: object
  admin.ReviewAuditRequest:
    properties:
      action:
        enum:
        - approve
        - reject
        type: string
      penalty_type:
        enum:
        - warning
        - ban
        type: string
      review_note:
        maxLength: 500
        type: string
    required:
    - action
    type: object
  admin.ReviewWithdrawRequest:
    properties:
      approved:
        type: boolean
      reason:
        type: string
      withdraw_id:
        type: string
    required:
    - withdraw_id
    type: object
  admin.SystemConfigRequest:
    properties:
      allowRegistration:
        type: boolean
      enableAudit:
        type: boolean
      maxUploadSize:
        type: integer
      requireEmailVerification:
        type: boolean
    type: object
  admin.SystemStatsResponse:
    properties:
      activeUsers:
        type: integer
      pendingAudits:
        type: integer
      totalBooks:
        type: integer
      totalRevenue:
        type: number
      totalUsers:
        type: integer
    type: object
  admin.UpdateCategoryRequest:
    properties:
      description:
        example: 玄幻小说分类
        type: string
      icon:
        example: /icons/xuanhuan.png
        type: string
      is_active:
        example: true
        type: boolean
      name:
        example: 玄幻
        type: string
      parent_id:
        example: ""
        type: string
      sort_order:
        example: 1
        type: integer
    type: object
  admin.UpdateConfigRequest:
    properties:
      key:
        type: string
      value: {}
    required:
    - key
    - value
    type: object
  admin.UpdateQuotaRequest:
    properties:
      quotaType:
        enum:
        - daily
        - monthly
        - total
        type: string
      totalQuota:
        minimum: 0
        type: integer
    required:
    - quotaType
    - totalQuota
    type: object
  admin.UpdateTemplateRequest:
    properties:
      category:
        type: string
      description:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    type: object
  admin.UpdateUserRoleRequest:
    properties:
      role:
        type: string
    required:
    - role
    type: object
  admin.UpdateUserStatusRequest:
    properties:
      banReason:
        type: string
      status:
        type: string
    required:
    - status
    type: object
  admin.ValidateConfigRequest:
    properties:
      yaml_content:
        type: string
    required:
    - yaml_content
    type: object
  ai.BackgroundData:
